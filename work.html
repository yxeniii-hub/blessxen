<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--bg:#080808;--surface:#0f0f0f;--surface2:#161616;--accent:#7B2FBE;--accent-glow:#9B4DDD;--accent-soft:#C084FC;--text:#f0f0f0;--muted:#666;--border:#1e1e1e;}
  body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;overflow-x:hidden;}
  nav{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(8,8,8,0.95);backdrop-filter:blur(10px);z-index:100;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:4px;color:var(--accent-soft);text-shadow:0 0 18px #7B2FBE99,0 0 40px #7B2FBE44;text-decoration:none;}
  .nav-links{display:flex;gap:2rem;align-items:center;}
  .nav-links a{font-size:0.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s;}
  .nav-links a:hover{color:var(--accent-soft);}
  .back-btn{font-size:0.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--accent-soft);text-decoration:none;border:1px solid var(--accent);padding:0.4rem 1rem;transition:all 0.2s;}
  .back-btn:hover{background:var(--accent);color:#fff;}
  .hero{padding:4rem 2rem 2rem;}
  .hero-eyebrow{font-size:0.6rem;letter-spacing:5px;text-transform:uppercase;color:var(--accent-soft);margin-bottom:1rem;}
  .hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,10vw,7rem);line-height:0.9;letter-spacing:2px;}
  .hero-title span{color:var(--accent-soft);text-shadow:0 0 24px #7B2FBEcc,0 0 60px #7B2FBE66;}
  .hero-sub{font-size:0.6rem;letter-spacing:2px;color:var(--muted);margin-top:1.5rem;line-height:1.8;}
  .section{padding:2rem 2rem 5rem;}
  .section-label{font-size:0.55rem;letter-spacing:5px;text-transform:uppercase;color:var(--accent-soft);margin-bottom:2rem;display:flex;align-items:center;gap:1rem;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);max-width:60px;}
  .video-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;}
  .video-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;transition:border-color 0.3s,transform 0.3s;position:relative;}
  .video-card:hover{border-color:var(--accent);transform:translateY(-4px);}
  .video-card:hover .card-glow{opacity:1;}
  .card-glow{position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent-soft);box-shadow:0 0 20px #7B2FBEcc;opacity:0;transition:opacity 0.3s;}
  .video-wrapper{position:relative;width:100%;padding-bottom:56.25%;background:#000;overflow:hidden;}
  .video-wrapper video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}
  .card-info{padding:1rem 1.2rem;border-top:1px solid var(--border);}
  .card-platform{font-size:0.5rem;letter-spacing:3px;text-transform:uppercase;color:var(--accent-soft);margin-bottom:0.4rem;}
  .card-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--text);}
  footer{padding:1.5rem 2rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
  footer span{font-size:0.55rem;letter-spacing:2px;color:var(--muted);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .hero-eyebrow,.hero-title,.hero-sub{animation:fadeUp 0.6s ease both;}
  .hero-eyebrow{animation-delay:0.1s}.hero-title{animation-delay:0.2s}.hero-sub{animation-delay:0.3s}
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">BLESSXEN</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html#services">Services</a>
    <a href="index.html" class="back-btn">← Back</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-eyebrow">// Portfolio — All Edits</div>
  <h1 class="hero-title">THE<br><span>WORK.</span></h1>
  <p class="hero-sub">Underground edits. Every platform. No generic.</p>
</div>

<section class="section">
  <div class="section-label">Latest Edits</div>
  <div class="video-grid">

    <div class="video-card">
      <div class="card-glow"></div>
      <div class="video-wrapper">
        <video controls>
          <source src="Osama V2.mp4" type="video/mp4">
        </video>
      </div>
      <div class="card-info">
        <div class="card-platform">Edit</div>
        <div class="card-title">Osama V2</div>
      </div>
    </div>

    <div class="video-card">
      <div class="card-glow"></div>
      <div class="video-wrapper">
        <video controls>
          <source src="Destroy Lonley La Final Part.mp4" type="video/mp4">
        </video>
      </div>
      <div class="card-info">
        <div class="card-platform">Edit</div>
        <div class="card-title">Destroy Lonely La Final Part</div>
      </div>
    </div>

    <div class="video-card">
      <div class="card-glow"></div>
      <div class="video-wrapper">
        <video controls>
          <source src="Or What.mp4" type="video/mp4">
        </video>
      </div>
      <div class="card-info">
        <div class="card-platform">Edit</div>
        <div class="card-title">Or What</div>
      </div>
    </div>

  </div>
</section>

<footer>
  <span>© 2026 BLESSXEN — All Rights Reserved</span>
  <span>New York — Available Worldwide</span>
</footer>
</body>
</html>
